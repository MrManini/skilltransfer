services:
  db:
    image: postgres:15-alpine
    container_name: skilltransfer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skilltransfer_db
      POSTGRES_USER: skilltransfer_user
      POSTGRES_PASSWORD: skilltransfer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilltransfer_user -d skilltransfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: skilltransfer_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-and-seed:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://skilltransfer_user:skilltransfer_password@db:5432/skilltransfer_db
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

volumes:
  postgres_data: